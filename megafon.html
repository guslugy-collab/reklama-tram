<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Звоним в кафе ТРАМ…</title>
<style>
  :root { --gold:#c9a84c; --forest:#0f1f17; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; }
  body {
    background:var(--forest); color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:24px; min-height:100vh; min-height:100dvh;
  }
  .logo { font-size:13px; letter-spacing:4px; text-transform:uppercase; color:var(--gold); margin-bottom:8px; }
  h1 { font-size:20px; font-weight:500; margin:0 0 28px; }
  .call-btn {
    display:flex; align-items:center; gap:12px;
    background:var(--gold); color:var(--forest);
    text-decoration:none; font-size:22px; font-weight:700;
    padding:18px 34px; border-radius:14px;
    -webkit-tap-highlight-color:rgba(201,168,76,0.25);
  }
  .call-btn svg { width:26px; height:26px; fill:var(--forest); }
  .hint { margin-top:18px; font-size:13px; color:rgba(255,255,255,0.55); }
</style>
</head>
<body>
  <div class="logo">Кафе ТРАМ · Мегафон</div>
  <h1>Открываем набор номера…</h1>
  <a id="call" class="call-btn" href="tel:+79280317652">
    <svg viewBox="0 0 24 24"><path d="M6.62 10.79a15.05 15.05 0 0 0 6.59 6.59l2.2-2.2a1 1 0 0 1 1.02-.24c1.12.37 2.33.57 3.57.57a1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1c0 1.24.2 2.45.57 3.57a1 1 0 0 1-.24 1.02l-2.2 2.2z"/></svg>
    Позвонить
  </a>
  <div class="hint">Если набор не открылся сам — нажмите кнопку выше</div>
<script>
  // Сразу запускаем звонок на номер Мегафон
  window.location.href = 'tel:+79280317652';
</script>
</body>
</html>
